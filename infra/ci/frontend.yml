# =============================================================================
# NetForge CI — Frontend (lint + typecheck + build)
# Salin/symlink ke .github/workflows/frontend.yml di root repo (orchestrator).
# =============================================================================
name: frontend-ci

on:
  push:
    paths: ["frontend/**", "infra/ci/frontend.yml"]
  pull_request:
    paths: ["frontend/**", "infra/ci/frontend.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build
