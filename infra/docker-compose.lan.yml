# =============================================================================
# NetGeo — LAN gateway overlay (used by ./install.sh, the one-shot installer)
# Jalankan: docker compose -f infra/docker-compose.yml -f infra/docker-compose.lan.yml up -d
#
# Menambah satu service `gateway` (nginx) di depan stack DEV agar seluruh app
# (frontend Vite + backend /api + /ws) bisa diakses dari satu origin/port di LAN.
#
# Port: HTTP_PORT (default 8090). DIPILIH 8090 supaya TIDAK bentrok dengan
# project saudara di host yang sama — SecureOps memakai :80, StorageHub :8080.
#
# Overlay ini TIDAK mengubah docker-compose.yml. Service postgres/redis/backend/
# frontend tetap apa adanya; ini hanya menambah pintu masuk LAN.
# =============================================================================

services:
  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8090}:80"
    volumes:
      # Config nginx tetap berada di area infra/ (di-mount, bukan di-bake).
      - ./docker/nginx.lan.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1 first
      # and nginx listens IPv4-only, so `localhost` gives "connection refused"
      # and the gateway is wrongly marked unhealthy while traffic works fine.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
