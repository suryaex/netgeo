# =============================================================================
# NetGeo — Docker Compose (DEVELOPMENT)
# Jalankan: docker compose -f infra/docker-compose.yml up -d
#
# Fokus DX: hot-reload backend & frontend, port di-expose ke host, data
# persisten di named volume. Untuk produksi pakai docker-compose.prod.yml.
#
# Multi-arch: image base (postgres/redis/python/node) sudah multi-arch
# (amd64+arm64). Build lokal otomatis mengikuti arsitektur host.
# =============================================================================

name: netgeo-dev

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — sumber-kebenaran persisten (topologi, project, user, config)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: netgeo
      POSTGRES_PASSWORD: netgeo          # dev only; prod pakai secret
      POSTGRES_DB: netgeo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Bootstrap skema saat volume pertama kali kosong: jalankan migrasi
      # OTORITATIF (infra/db/postgres/migrations) berurutan via bootstrap.sh.
      # Migrasi di-mount di sub-dir agar entrypoint TIDAK ikut menjalankan
      # file *.down.sql (entrypoint hanya memproses file di level atas).
      - ./db/postgres/bootstrap.sh:/docker-entrypoint-initdb.d/00_bootstrap.sh:ro
      - ./db/postgres/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netgeo -d netgeo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — state realtime, pub/sub WS fan-out, job queue (lihat redis-design.md)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend — FastAPI (app.main:app). Source di ../backend (di-mount untuk reload).
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://netgeo:netgeo@postgres:5432/netgeo
      REDIS_URL: redis://redis:6379/0
      # install.sh computes CORS from the detected LAN/VPN/public IPs and passes
      # it here.  The default includes :8090 (nginx gateway) and both common dev
      # ports so the app works whether you hit it via the gateway or Vite direct.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5180,http://localhost:3000,http://localhost:8090}
      EMULATION_BACKEND: "null"
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app          # hot-reload source
      # Shared update-state dir: the in-app update action writes a trigger here,
      # picked up by the host-side watcher (scripts/self-update.sh --watch,
      # installed by install.sh) which pulls + rebuilds + restarts. Keeps the
      # docker socket OUT of the backend container.
      - ${NETGEO_STATE_DIR:-/var/lib/netgeo}:/var/lib/netgeo
    # --reload untuk dev (override CMD image).
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Frontend — Vite dev server (React 18). Source di ../frontend.
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      # Vite proxy /api & /ws ke backend (lihat frontend/vite.config.ts).
      VITE_BACKEND_ORIGIN: http://backend:8000
    ports:
      - "5180:5180"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  frontend_node_modules:
