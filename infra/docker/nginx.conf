# NetGeo frontend nginx — SPA + reverse proxy ke backend FastAPI.
# Di-mount ke /etc/nginx/conf.d/default.conf oleh docker-compose.prod.yml.
# Satu origin untuk browser: /api dan /ws diteruskan ke service `backend`.

upstream netgeo_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Aset statis di-cache agresif (Vite memberi hash di nama file).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # REST API -> backend.
    location /api/ {
        proxy_pass http://netgeo_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    # WebSocket (/ws/topology, /ws/console/{id}) -> backend, dengan upgrade.
    location /ws/ {
        proxy_pass http://netgeo_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;   # koneksi WS panjang (telemetry stream)
        proxy_send_timeout 3600s;
    }

    # SPA fallback: semua route lain -> index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
