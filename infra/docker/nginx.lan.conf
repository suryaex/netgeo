# NetGeo — LAN reverse proxy for the DEV stack (install.sh default path).
# Mounted into the `gateway` nginx service added by docker-compose.lan.yml.
# Fronts the dev stack on a single origin (HTTP_PORT, default 8090):
#   /            -> Vite dev server (frontend:5180), with HMR websocket upgrade
#   /api, /ws    -> backend FastAPI (backend:8000)
# This lets phones/other PCs reach the whole app on one port, exactly like the
# sibling projects (SecureOps :80, StorageHub :8080, NetGeo :8090).

upstream netgeo_backend_lan  { server backend:8000; }
upstream netgeo_frontend_lan { server frontend:5180; }

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # REST API -> backend.
    location /api/ {
        proxy_pass http://netgeo_backend_lan;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    # WebSocket (/ws/topology, /ws/console/{id}) -> backend, with upgrade.
    location /ws/ {
        proxy_pass http://netgeo_backend_lan;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else -> Vite dev server. Upgrade headers carry Vite HMR sockets.
    location / {
        proxy_pass http://netgeo_frontend_lan;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 75s;
    }
}
